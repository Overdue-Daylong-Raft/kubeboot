apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: control-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: control-platform
  source:
    repoURL: https://example.invalid/replace-me.git
    targetRevision: master
    path: gitops/platform/control/bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
